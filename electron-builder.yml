appId: com.bilpow.app
productName: BilPow
copyright: Copyright © 2026 BilPow

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
  - public/**/*

extraResources:
  - from: public
    to: public
    filter:
      - "**/*"

asar: true

# Publish configuration for GitHub Releases
publish:
  provider: github
  owner: HamzaA4E
  repo: BP-RELEASES
  # Optional: Set to true to publish draft releases
  # releaseType: draft

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: public/logo.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: public/logo.ico
  uninstallerIcon: public/logo.ico
  installerHeaderIcon: public/logo.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: BilPow

mac:
  target:
    - dmg
  icon: build/logo.icns
  category: public.app-category.productivity

linux:
  target:
    - AppImage
  icon: build/icon.png
  category: Engineering

  directories:
  output: release
  buildResources: build

artifactName: "${productName}-Setup-${version}.${ext}"
